<svg xmlns="http://www.w3.org/2000/svg" width="450" height="195" viewBox="0 0 450 195" fill="none" role="img" aria-label="Sourabh's GitHub stats">
  <defs>
    <linearGradient id="cardbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b27"/><stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7aa2f7"/><stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="449" height="194" rx="14" fill="url(#cardbg)" stroke="#565f89" stroke-opacity="0.35"/>

  <text x="28" y="40" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="20" font-weight="700" fill="#bb9af7">Sourabh's GitHub Stats</text>
  <rect x="28" y="50" width="0" height="2.5" rx="1" fill="#7aa2f7"><animate attributeName="width" values="0;250" dur="1s" fill="freeze"/></rect>

  <g font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" fill="#c0caf5">
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.2s" fill="freeze"/>
      <text x="30" y="82" font-size="16">⭐</text><text x="56" y="82">Total Stars Earned:</text>
      <text x="290" y="82" font-weight="700" fill="#7dcfff">1</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.35s" fill="freeze"/>
      <text x="30" y="108" font-size="16">📦</text><text x="56" y="108">Public Repositories:</text>
      <text x="290" y="108" font-weight="700" fill="#7dcfff">28</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
      <text x="30" y="134" font-size="16">👥</text><text x="56" y="134">Followers:</text>
      <text x="290" y="134" font-weight="700" fill="#7dcfff">3</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.65s" fill="freeze"/>
      <text x="30" y="160" font-size="16">🧠</text><text x="56" y="160">Focus:</text>
      <text x="290" y="160" font-weight="700" fill="#9ece6a">AI / ML</text>
    </g>
  </g>

  <!-- rank ring -->
  <g transform="translate(370,97)">
    <circle r="42" fill="none" stroke="#24283b" stroke-width="7"/>
    <circle r="42" fill="none" stroke="url(#ring)" stroke-width="7" stroke-linecap="round"
            stroke-dasharray="264" stroke-dashoffset="264" transform="rotate(-90)">
      <animate attributeName="stroke-dashoffset" values="264;55" dur="1.4s" begin="0.3s" fill="freeze"/>
    </circle>
    <text y="-2" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="26" font-weight="800" fill="#c0caf5">A+</text>
    <text y="18" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#565f89">since 2025</text>
  </g>
</svg>
