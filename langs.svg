<svg xmlns="http://www.w3.org/2000/svg" width="450" height="195" viewBox="0 0 450 195" fill="none" role="img" aria-label="Most used languages">
  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b27"/><stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="449" height="194" rx="14" fill="url(#lbg)" stroke="#565f89" stroke-opacity="0.35"/>

  <text x="28" y="40" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="20" font-weight="700" fill="#bb9af7">Most Used Languages</text>
  <rect x="28" y="50" width="0" height="2.5" rx="1" fill="#7aa2f7"><animate attributeName="width" values="0;235" dur="1s" fill="freeze"/></rect>

  <!-- stacked bar -->
  <g transform="translate(28,72)">
    <rect width="394" height="12" rx="6" fill="#24283b"/>
    <clipPath id="barclip"><rect width="394" height="12" rx="6"/></clipPath>
    <g clip-path="url(#barclip)">
      <rect x="0"   width="0" height="12" fill="#3776ab"><animate attributeName="width" values="0;173" dur="1s" begin="0.2s" fill="freeze"/></rect>
      <rect x="173" width="0" height="12" fill="#da5b0b"><animate attributeName="width" values="0;169" dur="1s" begin="0.4s" fill="freeze"/></rect>
      <rect x="342" width="0" height="12" fill="#3178c6"><animate attributeName="width" values="0;52"  dur="1s" begin="0.6s" fill="freeze"/></rect>
    </g>
  </g>

  <!-- legend -->
  <g font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#c0caf5">
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
      <circle cx="40" cy="118" r="6" fill="#3776ab"/><text x="54" y="123">Python</text>
      <text x="200" y="123" fill="#565f89">43.9%</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.65s" fill="freeze"/>
      <circle cx="230" cy="118" r="6" fill="#da5b0b"/><text x="244" y="123">Jupyter Notebook</text>
      <text x="392" y="123" fill="#565f89">42.9%</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.8s" fill="freeze"/>
      <circle cx="40" cy="150" r="6" fill="#3178c6"/><text x="54" y="155">TypeScript</text>
      <text x="200" y="155" fill="#565f89">13.2%</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.95s" fill="freeze"/>
      <circle cx="230" cy="150" r="6" fill="#9ece6a"/><text x="244" y="155">SQL &#38; more</text>
    </g>
  </g>
</svg>
