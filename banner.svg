<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="290" viewBox="0 0 1200 290" fill="none" role="img" aria-label="Sourabh Pawar - AI / ML Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16161e"/>
      <stop offset="45%" stop-color="#1a1b27"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="45%" stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#7dcfff"/>
      <animate attributeName="x1" values="0;0.4;0" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;1.4;1" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#7dcfff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="290" rx="18" fill="url(#bg)"/>
  <ellipse cx="300" cy="60" rx="420" ry="220" fill="url(#glow)"/>
  <ellipse cx="950" cy="240" rx="380" ry="200" fill="url(#glow)"/>

  <!-- faint dot grid -->
  <g fill="#565f89" opacity="0.16">
    <circle cx="60" cy="40" r="2"/><circle cx="120" cy="40" r="2"/><circle cx="180" cy="40" r="2"/>
    <circle cx="1140" cy="250" r="2"/><circle cx="1080" cy="250" r="2"/><circle cx="1020" cy="250" r="2"/>
    <circle cx="1140" cy="40" r="2"/><circle cx="1080" cy="40" r="2"/>
    <circle cx="60" cy="250" r="2"/><circle cx="120" cy="250" r="2"/>
  </g>

  <!-- floating particles -->
  <g fill="#bb9af7">
    <circle cx="180" cy="90" r="3" opacity="0.7"><animate attributeName="cy" values="90;70;90" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="1010" cy="120" r="2.5" opacity="0.6" fill="#7dcfff"><animate attributeName="cy" values="120;140;120" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="70" r="2" opacity="0.6" fill="#7aa2f7"><animate attributeName="cy" values="70;55;70" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="200" r="2.5" opacity="0.5"><animate attributeName="cy" values="200;185;200" dur="5.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- title -->
  <text x="600" y="132" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="62" font-weight="800" fill="url(#title)" letter-spacing="1">
    Sourabh Pawar
    <animate attributeName="opacity" values="0;1" dur="1.1s" begin="0s" fill="freeze"/>
  </text>

  <!-- animated underline -->
  <rect x="360" y="150" width="480" height="3" rx="1.5" fill="url(#line)">
    <animate attributeName="width" values="0;480" dur="1.2s" begin="0.4s" fill="freeze"/>
    <animate attributeName="x" values="600;360" dur="1.2s" begin="0.4s" fill="freeze"/>
  </rect>

  <!-- subtitle -->
  <text x="600" y="192" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="23" font-weight="500" fill="#c0caf5" letter-spacing="2">
    AI / ML Engineer &#160;•&#160; Building intelligent systems
    <animate attributeName="opacity" values="0;0;1" dur="1.8s" begin="0s" fill="freeze"/>
  </text>

  <!-- tech chips -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="1s" begin="1.1s" fill="freeze"/>
    <g transform="translate(378,222)">
      <rect width="112" height="30" rx="15" fill="#24283b" stroke="#7aa2f7" stroke-opacity="0.5"/>
      <text x="56" y="20" text-anchor="middle" fill="#7aa2f7">Python</text>
    </g>
    <g transform="translate(502,222)">
      <rect width="150" height="30" rx="15" fill="#24283b" stroke="#bb9af7" stroke-opacity="0.5"/>
      <text x="75" y="20" text-anchor="middle" fill="#bb9af7">Machine Learning</text>
    </g>
    <g transform="translate(664,222)">
      <rect width="122" height="30" rx="15" fill="#24283b" stroke="#7dcfff" stroke-opacity="0.5"/>
      <text x="61" y="20" text-anchor="middle" fill="#7dcfff">LLM Agents</text>
    </g>
    <g transform="translate(798,222)">
      <rect width="120" height="30" rx="15" fill="#24283b" stroke="#9ece6a" stroke-opacity="0.5"/>
      <text x="60" y="20" text-anchor="middle" fill="#9ece6a">Computer Vision</text>
    </g>
  </g>
</svg>
